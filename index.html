<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>성경 장제목 퍼즐 게임</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body spellcheck="false">
    <div class="container">
        <header>
            <h1>성경 장제목 퍼즐</h1>
            <div class="controls">
                <select id="testament-select">
                    <option value="OT">구약</option>
                    <option value="NT">신약</option>
                </select>
                <select id="book-select"></select>
                <select id="range-select"></select>
                <button id="start-btn">게임 시작</button>
                <button id="hint-btn">💡 힌트</button>
                <button id="open-editor-btn">에디터</button>
                <button id="open-history-btn" style="background-color:#8e44ad;">&#128202; 기록</button>
                
                <div class="stats">
                    <div class="stat-item">진행: <span id="progress-text">0/0</span></div>
                    <div class="stat-item">시간: <span id="timer-text">00:00</span></div>
                    <div class="stat-item record">최고: <span id="best-record-text">없음</span></div>
                    <div class="tts-group">
                        <label><input type="checkbox" id="tts-toggle" checked> 🔊</label>
                    </div>
                </div>
            </div>
        </header>

        <main>
            <!-- Drop Zones -->
            <section class="puzzle-board" id="puzzle-board">
                <!-- Drop slots will be generated here -->
            </section>

            <!-- Draggable Pieces -->
            <section class="pieces-pool" id="pieces-pool">
                <!-- Draggable pieces will be generated here -->
            </section>
        </main>
        
        <!-- Success Modal -->
        <div id="success-modal" class="modal hidden">
            <div class="modal-content">
                <span id="close-success-btn" class="close-btn">&times;</span>
                <h2>축하합니다! 🎉</h2>
                <p>선택한 범위의 장제목을 모두 맞추셨습니다.</p>
                <div style="margin: 1.5rem 0; padding: 1.5rem; background: #f8f9fa; border-radius: 8px; border: 1px solid #e9ecef;">
                    <p style="font-size: 1.3rem; margin-bottom: 0;">완성 시간: <strong id="final-time" style="color: var(--primary-color); font-family: monospace;">00:00</strong></p>
                    <p id="new-record-msg" style="color: var(--success-color); font-weight: bold; margin-top: 0.8rem; display: none; font-size: 1.1rem; animation: popIn 0.3s ease-out;">🏆 새로운 최고 기록입니다!</p>
                </div>
                <div style="display: flex; gap: 10px; justify-content: center;">
                    <button id="restart-btn">다시 하기</button>
                    <button id="review-btn" style="background-color: #e74c3c; display: none;">📝 오답 노트</button>
                </div>
            </div>
        </div>

        <!-- Review Modal -->
        <div id="review-modal" class="modal hidden">
            <div class="modal-content" style="width: 90%; max-width: 500px; text-align: left;">
                <h2 style="color: #e74c3c; margin-bottom: 1rem; font-size: 1.8rem;">📝 오답 노트</h2>
                <p style="margin-bottom: 1rem; color: #555;">잘못된 위치에 놓았던 장 제목들입니다. 다시 복습해 보세요!</p>
                <ul id="review-list" style="max-height: 300px; overflow-y: auto; list-style: none; padding: 0; margin-bottom: 1.5rem; border: 1px solid var(--border-color); border-radius: 4px; background: #fdfdfd;">
                </ul>
                <div style="text-align: right;">
                    <button id="close-review-btn" style="background-color: #95a5a6;">닫기</button>
                </div>
            </div>
        </div>
        
        <!-- Data Editor Modal -->
        <div id="editor-modal" class="modal hidden">
            <div class="modal-content" style="width: 90%; max-width: 600px; text-align: left;">
                <h2 style="color: var(--primary-color); margin-bottom: 0.5rem; font-size: 1.8rem;">데이터 입력기</h2>
                <p style="margin-bottom: 1rem; color: #555; font-size: 0.95rem;">성경을 선택하고 각 줄에 장 제목을 입력하세요.</p>
                <div class="controls" style="flex-direction: row; margin-bottom: 1rem;">
                    <select id="edit-testament-select">
                        <option value="OT">구약</option>
                        <option value="NT">신약</option>
                    </select>
                    <select id="edit-book-select" style="flex: 1;"></select>
                </div>
                <textarea id="edit-textarea" rows="15" style="width: 100%; padding: 10px; font-size: 1rem; border: 1px solid var(--border-color); border-radius: 4px; resize: vertical; line-height: 1.5; font-family: inherit;" placeholder="장 제목과 요약 내용을 '|' 기호로 구분해서 입력하세요.&#10;(요약 내용이 없으면 장 제목만 입력해도 됩니다)&#10;&#10;예:&#10;천지 창조 | 태초에 하나님이 천지를 창조하시니라&#10;에덴 동산 | 아담과 하와가 에덴 동산에서 살게 됨&#10;죄의 기원과 인류의 타락" spellcheck="false"></textarea>
                <div style="margin-top: 1rem; display: flex; gap: 10px; justify-content: flex-end; flex-wrap: wrap;">
                    <button id="close-editor-btn" style="background-color: #95a5a6;">닫기</button>
                    <button id="export-data-btn" style="background-color: #3498db;">📥 파일 내보내기</button>
                    <button id="import-data-btn" style="background-color: #e67e22;">📤 파일 가져오기</button>
                    <input type="file" id="import-file-input" accept=".json" style="display: none;">
                    <button id="save-data-btn" style="background-color: var(--primary-color);">💾 바로 저장</button>
                    <button id="copy-data-btn" style="background-color: var(--success-color);">전체 코드 복사</button>
                </div>
            </div>
        </div>
    </div>

    <!-- History Modal -->
    <div id="history-modal" class="modal hidden">
        <div class="modal-content history-modal-content">
            <span id="close-history-btn" class="close-btn">&times;</span>
            <h2 style="color:#8e44ad;">&#128202; 게임 기록</h2>

            <!-- 필터 탭 -->
            <div class="history-filter-tabs">
                <button class="htab active" data-filter="daily">일간</button>
                <button class="htab" data-filter="weekly">주간</button>
                <button class="htab" data-filter="monthly">월간</button>
                <button class="htab" data-filter="custom">선택기간</button>
            </div>
            <div id="history-custom-range" class="history-custom-range hidden">
                <label>시작 <input type="date" id="hist-date-from"></label>
                <label>종료 <input type="date" id="hist-date-to"></label>
                <button id="hist-apply-btn">조회</button>
            </div>

            <!-- 통계 및 전체삭제 -->
            <div class="history-toolbar">
                <span id="history-count">0건</span>
                <button id="delete-all-history-btn" class="btn-danger-sm">휴지통 비우기</button>
            </div>

            <!-- 목록 -->
            <div class="history-list-wrap">
                <table class="history-table">
                    <thead>
                        <tr>
                            <th>구분</th>
                            <th>성경</th>
                            <th>범위</th>
                            <th>시작</th>
                            <th>종료</th>
                            <th>소요</th>
                            <th>메모</th>
                            <th>액션</th>
                        </tr>
                    </thead>
                    <tbody id="history-tbody"></tbody>
                </table>
                <p id="history-empty" class="history-empty hidden">해당 기간의 기록이 없습니다.</p>
            </div>
        </div>
    </div>

    <!-- Memo Edit Modal -->
    <div id="memo-modal" class="modal hidden">
        <div class="modal-content" style="max-width:420px;">
            <span id="close-memo-btn" class="close-btn">&times;</span>
            <h2 style="font-size:1.3rem;margin-bottom:1rem;">메모 편집</h2>
            <textarea id="memo-textarea" rows="5" style="width:100%;padding:10px;font-size:1rem;border:1px solid var(--border-color);border-radius:8px;resize:vertical;font-family:inherit;" placeholder="메모를 입력하세요..." spellcheck="false"></textarea>
            <div style="margin-top:1rem;display:flex;gap:10px;justify-content:flex-end;">
                <button id="close-memo-btn2" style="background:#95a5a6;">취소</button>
                <button id="save-memo-btn" style="background:var(--primary-color);">&#128190; 저장</button>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
