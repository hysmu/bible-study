<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>플래시카드 프로</title>

    <!-- PWA Settings -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Libraries -->
    <!-- PapaParse for CSV parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <!-- jsPDF and html2canvas for PDF export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="light-mode">
    <div id="app">
        <!-- Header -->
        <header class="app-header">
            <div class="logo">
                <i data-lucide="layers"></i>
                <h1>FlashPro</h1>
            </div>
            <div class="header-actions">
                <button id="themeToggle" class="icon-btn" aria-label="테마 변경">
                    <i data-lucide="moon" id="themeIcon"></i>
                </button>
            </div>
        </header>

        <!-- Main Content Area -->
        <main id="mainContent">

            <!-- VIEW: Deck List (Home) -->
            <section id="view-decks" class="view active">
                <div class="view-header">
                    <h2>나의 덱</h2>
                    <div class="view-actions">
                        <button id="btnCreateFolder" class="btn secondary">새 폴더 만들기</button>
                        <button id="btnCreateDeck" class="btn primary">새 덱 만들기</button>
                    </div>
                </div>

                <!-- Deck Grid -->
                <div class="deck-grid" id="deckListContainer">
                    <!-- Decks will be injected here via JS -->
                </div>

                <div class="view-header mt-8">
                    <h2>전체 학습 통계</h2>
                    <button id="btnViewLogs" class="btn outline small">상세 로그 보기</button>
                </div>
                <div class="stats-dashboard card-panel mb-6" id="globalStatsContainer">
                    <div class="stat-item">
                        <span class="stat-value" id="globalStatCards">0</span>
                        <span class="stat-label">오늘 학습한 카드</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="globalStatTotal">0</span>
                        <span class="stat-label">누적 학습 횟수</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="globalStatAccuracy">0%</span>
                        <span class="stat-label">평균 정답률</span>
                    </div>
                </div>

                <div class="view-header mt-8">
                    <h2>데이터 관리</h2>
                </div>
                <div class="data-actions card-panel">
                    <div class="action-group">
                        <p>CSV 파일로 카드를 가져오거나 데이터를 백업하세요.</p>
                        <div class="btn-group">
                            <label for="csvFileInput" class="btn secondary">
                                <i data-lucide="upload"></i> CSV 가져오기
                            </label>
                            <input type="file" id="csvFileInput" accept=".csv" style="display:none;">
                            <button id="btnExportCsv" class="btn outline">
                                <i data-lucide="file-spreadsheet"></i> CSV 내보내기
                            </button>

                            <button id="btnExportAll" class="btn outline">
                                <i data-lucide="download"></i> 전체 백업 (JSON)
                            </button>
                            <label for="jsonFileInput" class="btn outline">
                                <i data-lucide="upload-cloud"></i> 데이터 복원
                            </label>
                            <input type="file" id="jsonFileInput" accept=".json" style="display:none;">
                        </div>
                    </div>
                </div>
            </section>

            <section id="view-deck-details" class="view hidden">
                <div class="view-header">
                    <div class="flex-align" style="gap: 0.5rem;">
                        <button class="icon-btn btn-back" aria-label="뒤로가기">
                            <i data-lucide="arrow-left"></i>
                        </button>
                        <h2 id="detailDeckTitle">덱 제목</h2>
                        <button id="btnEditDeckName" class="icon-btn" aria-label="덱 이름 수정" title="덱 이름 수정">
                            <i data-lucide="edit-2" style="width: 18px; height: 18px;"></i>
                        </button>
                    </div>
                    <div class="view-actions">
                        <button id="btnStudyDeck" class="btn primary">
                            <i data-lucide="play"></i> 대기 학습
                        </button>
                        <button id="btnStudyAllDeck" class="btn secondary" title="순서대로 복습">
                            <i data-lucide="repeat"></i> 순차 복습
                        </button>
                        <button id="btnStudyRandomDeck" class="btn secondary" title="랜덤으로 섞어서 복습">
                            <i data-lucide="shuffle"></i> 랜덤 복습
                        </button>
                        <button id="btnExportPdf" class="btn outline">
                            <i data-lucide="file-text"></i> PDF 출력
                        </button>
                    </div>
                </div>

                <!-- Deck Statistics Summary -->
                <div class="stats-summary card-panel mb-6">
                    <div class="stat-item">
                        <span class="stat-value" id="statTotalCards">0</span>
                        <span class="stat-label">전체 카드</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="statDueCards">0</span>
                        <span class="stat-label">학습 대기</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="statAccuracy">0%</span>
                        <span class="stat-label">정답률</span>
                    </div>
                </div>

                <div class="card-list-header flex-align-between mb-4">
                    <h3>카드 목록</h3>
                    <button id="btnAddCard" class="btn outline small">카드 추가</button>
                </div>

                <!-- Bulk card actions -->
                <div class="card-list-actions flex-align-between mb-4 hidden" id="cardListActions" style="background: var(--secondary); padding: 0.5rem 1rem; border-radius: var(--radius-sm);">
                    <div class="flex-align" style="gap: 1rem;">
                        <label style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.9rem; cursor: pointer; color: var(--text-main); font-weight: 500;">
                            <input type="checkbox" id="cbSelectAllCards" style="width: 16px; height: 16px; cursor: pointer;">
                            <span>전체 선택</span>
                        </label>
                        <span id="selectedCardsCount" style="font-size: 0.9rem; color: var(--primary); font-weight: 600;">0장 선택됨</span>
                    </div>
                    <button id="btnMoveSelectedCards" class="btn primary small" disabled>
                        <i data-lucide="move"></i> 선택 카드 이동
                    </button>
                </div>

                <div class="card-list" id="cardListContainer">
                    <!-- Cards will be injected here -->
                </div>
            </section>

            <!-- VIEW: Study Mode -->
            <section id="view-study" class="view hidden">
                <div class="study-header flex-align-between mb-4">
                    <button class="icon-btn btn-back" aria-label="학습 종료">
                        <i data-lucide="x"></i>
                    </button>
                    <div class="study-progress">
                        <span id="studyProgressText">1 / 10</span>
                        <div class="progress-bar-bg">
                            <div class="progress-bar-fill" id="studyProgressBar"></div>
                        </div>
                    </div>
                    <div class="study-actions" style="display:flex; gap:0.5rem;">
                        <button id="btnToggleAutoPlay" class="icon-btn" aria-label="자동 재생" title="자동 재생 시작">
                            <i data-lucide="play-circle" id="autoPlayIcon"></i>
                        </button>
                        <button id="btnToggleReverse" class="icon-btn" aria-label="리버스 모드" title="리버스 모드 (뒷면 먼저 보기)">
                            <i data-lucide="refresh-cw"></i>
                        </button>
                    </div>
                </div>

                <!-- Flashcard Area -->
                <div class="flashcard-container" id="flashcardContainer">
                    <div class="flashcard" id="activeFlashcard">
                        <div class="flashcard-inner">
                            <div class="flashcard-front">
                                <button class="btn-tts tts-front" aria-label="읽기">
                                    <i data-lucide="volume-2"></i>
                                </button>
                                <div class="card-content" id="cardFrontText">앞면 내용</div>
                                <div class="hint-text">클릭하여 뒤집기</div>
                            </div>
                            <div class="flashcard-back">
                                <button class="btn-tts tts-back" aria-label="읽기">
                                    <i data-lucide="volume-2"></i>
                                </button>
                                <div class="card-content answer-text" id="cardBackText">뒷면 정답</div>
                                <div class="card-reference" id="cardReferenceText" style="display: none;">
                                    <strong>참고 자료:</strong> <span></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Study Controls -->
                <div class="study-controls">
                    <button id="btnShowAnswer" class="btn primary full-width">정답 보기</button>

                    <div id="srsControls" class="srs-controls hidden">
                        <button class="btn srs-btn btn-again" data-score="0">
                            <span class="label">다시 (1분)</span>
                            <span class="desc">Again</span>
                        </button>
                        <button class="btn srs-btn btn-hard" data-score="1">
                            <span class="label">어려움</span>
                            <span class="desc">Hard</span>
                        </button>
                        <button class="btn srs-btn btn-good" data-score="2">
                            <span class="label">알맞음</span>
                            <span class="desc">Good</span>
                        </button>
                        <button class="btn srs-btn btn-easy" data-score="3">
                            <span class="label">쉬움</span>
                            <span class="desc">Easy</span>
                        </button>
                    </div>
                </div>
            </section>
            <!-- VIEW: Logs -->
            <section id="view-logs" class="view hidden">
                <div class="view-header">
                    <div class="flex-align">
                        <button class="icon-btn btn-back" aria-label="뒤로가기">
                            <i data-lucide="arrow-left"></i>
                        </button>
                        <h2>상세 학습 로그</h2>
                    </div>
                </div>
                <div class="card-panel" style="max-height: 70vh; overflow-y: auto;">
                    <div id="logsListContainer" style="display: flex; flex-direction: column; gap: 1rem;">
                        <!-- Logs injected here -->
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Modals -->
    <!-- Create Folder Modal -->
    <div id="modalCreateFolder" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>새 폴더 만들기</h3>
                <button class="icon-btn btn-close-modal"><i data-lucide="x"></i></button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="folderNameInput">폴더 이름</label>
                    <input type="text" id="folderNameInput" placeholder="예: 언어, 수학, 자격증...">
                </div>
                <div class="form-actions">
                    <button class="btn secondary btn-close-modal">취소</button>
                    <button id="btnConfirmCreateFolder" class="btn primary">만들기</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Move Item Modal -->
    <div id="modalMoveItem" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>폴더 이동</h3>
                <button class="icon-btn btn-close-modal"><i data-lucide="x"></i></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="moveItemId">
                <input type="hidden" id="moveItemType">
                <div class="form-group">
                    <label for="moveTargetSelect">이동할 위치 선택</label>
                    <select id="moveTargetSelect" style="width:100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: var(--radius-sm); font-family: inherit; font-size: 1rem;">
                        <option value="root">최상위 위치 (기본)</option>
                        <!-- Folders injected here -->
                    </select>
                </div>
                <div class="form-actions">
                    <button class="btn secondary btn-close-modal">취소</button>
                    <button id="btnConfirmMove" class="btn primary">이동</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Move Selected Cards Modal -->
    <div id="modalMoveCards" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>선택한 카드 이동/복사</h3>
                <button class="icon-btn btn-close-modal"><i data-lucide="x"></i></button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="moveCardsTargetSelect">대상 덱 선택</label>
                    <select id="moveCardsTargetSelect" style="width:100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: var(--radius-sm); font-family: inherit; font-size: 1rem;">
                        <!-- Decks injected here -->
                    </select>
                </div>
                <div class="form-group" style="margin-top: 12px; margin-bottom: 8px;">
                    <label style="display: flex; align-items: center; gap: 0.5rem; font-weight: normal; cursor: pointer; color: var(--text-main);">
                        <input type="checkbox" id="chkKeepOriginal" style="width: 18px; height: 18px; cursor: pointer;">
                        <span>원본 카드를 현재 위치에 남겨두기 (복사)</span>
                    </label>
                </div>
                <div class="form-actions">
                    <button class="btn secondary btn-close-modal">취소</button>
                    <button id="btnConfirmMoveCards" class="btn primary">이동</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Create Deck Modal -->
    <div id="modalCreateDeck" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>새 덱 만들기</h3>
                <button class="icon-btn btn-close-modal"><i data-lucide="x"></i></button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="deckNameInput">덱 이름</label>
                    <input type="text" id="deckNameInput" placeholder="예: 영어 단어장, 한국사 연표...">
                </div>
                <div class="form-actions">
                    <button class="btn secondary btn-close-modal">취소</button>
                    <button id="btnConfirmCreateDeck" class="btn primary">만들기</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Card Modal -->
    <div id="modalAddCard" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>카드 추가/수정</h3>
                <button class="icon-btn btn-close-modal"><i data-lucide="x"></i></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editCardId">
                <div class="form-group">
                    <label for="cardFrontInput">질문 (앞면)</label>
                    <div id="cardFrontInput" contenteditable="true" class="rich-textarea" placeholder="질문을 입력하세요"></div>
                </div>
                <div class="form-group">
                    <label for="cardBackInput">정답 (뒷면)</label>
                    <div id="cardBackInput" contenteditable="true" class="rich-textarea" placeholder="정답을 입력하세요"></div>
                </div>
                <div class="form-group">
                    <label for="cardReferenceInput">참고자료 (옵션)</label>
                    <div id="cardReferenceInput" contenteditable="true" class="rich-textarea" placeholder="관련 링크나 부가 설명을 입력하세요"></div>
                </div>
                <div class="form-actions">
                    <button class="btn secondary btn-close-modal">취소</button>
                    <button id="btnConfirmAddCard" class="btn primary">저장</button>
                </div>
            </div>
        </div>
    </div>

    <!-- PDF Export Modal -->
    <div id="modalExportPdf" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>PDF 출력 옵션</h3>
                <button class="icon-btn btn-close-modal"><i data-lucide="x"></i></button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="pdfFileNameInput">파일 이름</label>
                    <input type="text" id="pdfFileNameInput" placeholder="기본값: 덱이름_flashcards">
                </div>
                <div class="form-group">
                    <label for="pdfLayoutSelect">출력 레이아웃 선택</label>
                    <select id="pdfLayoutSelect"
                        style="width:100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: var(--radius-sm); font-family: inherit; font-size: 1rem;">
                        <option value="8">8장 / 페이지 (모아 찍기)</option>
                        <option value="1">1장 / 페이지 (크게 보기)</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button class="btn secondary btn-close-modal">취소</button>
                    <button id="btnConfirmExportPdf" class="btn primary">출력 시작</button>
                </div>
            </div>
        </div>
    </div>

    <!-- CSV Export Modal -->
    <div id="modalExportCsv" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>CSV 내보내기</h3>
                <button class="icon-btn btn-close-modal"><i data-lucide="x"></i></button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <div class="flex-align-between" style="margin-bottom: 8px;">
                        <label style="margin-bottom: 0;">내보낼 덱 선택 (다중 선택 가능)</label>
                        <div style="display: flex; gap: 8px;">
                            <button type="button" id="btnSelectAllDecks" class="btn outline small" style="padding: 4px 8px; font-size: 0.8rem; height: auto; min-height: 0;">전체 선택</button>
                            <button type="button" id="btnDeselectAllDecks" class="btn outline small" style="padding: 4px 8px; font-size: 0.8rem; height: auto; min-height: 0;">전체 해제</button>
                        </div>
                    </div>
                    <div id="csvDeckSelection"
                        style="max-height: 200px; overflow-y: auto; border: 1px solid var(--border-color); padding: 10px; border-radius: var(--radius-sm);">
                        <!-- checkboxes -->
                    </div>
                </div>
                <div class="form-actions">
                    <button class="btn secondary btn-close-modal">취소</button>
                    <button id="btnConfirmExportCsv" class="btn primary">선택 항목 내보내기</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Invisible Container for PDF Export -->
    <div id="pdfExportContainer" style="position: absolute; left: -9999px; top: -9999px;"></div>

    <script src="app.js"></script>
</body>

</html>
